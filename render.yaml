databases:
  - name: quiz-db
    databaseName: quiz_db
    user: quiz_user
    plan: free

services:
  - type: web
    name: quiz-backend
    env: docker
    plan: free
    rootDir: backend
    healthCheckPath: /api/
    # We pass the automatically provided internal connection string
    # from the `quiz-db` database to this web service.
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: quiz-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"

  - type: web
    name: quiz-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      # This handles React Router paths by returning the main index file
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: quiz-backend
          property: host
          # We format it to a full URL
          format: https://{value}
