services:
  # Backend Service (Django)
  - type: web
    name: quiz-backend
    env: python
    buildCommand: "./backend/build.sh"
    startCommand: "gunicorn quiz_backend.wsgi:application --chdir backend"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: quiz-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".render.com"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "True" # You can restrict this later to the frontend URL
      - key: FRONTEND_URL
        sync: false
      - key: DJANGO_SUPERUSER_USERNAME
        sync: false
      - key: DJANGO_SUPERUSER_EMAIL
        sync: false
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false

  # Frontend Service (React/Vite)
  - type: web
    name: quiz-frontend
    env: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "frontend/dist"
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"

databases:
  - name: quiz-db
    databaseName: quiz_db
    user: quiz_user
    plan: free
